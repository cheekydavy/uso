<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup and Login</title>
    <script>
        async function submitSignupForm(event) {
            event.preventDefault(); // Prevent form submission
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            const response = await fetch("https://script.google.com/macros/s/AKfycbzNnMksn-EjkB7JYZ3QT2Hk5PjBpySPFYNMlE5xIoy3W6QwqVVELyuXca1V8c0jAwvW7Q/exec", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    action: 'signup',
                    email: email,
                    password: password
                })
            });

            const data = await response.json();
            alert(data.message);
        }

        async function submitLoginForm(event) {
            event.preventDefault(); // Prevent form submission
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const response = await fetch("YOUR_APPS_SCRIPT_URL_HERE", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    action: 'login',
                    email: email,
                    password: password
                })
            });

            const data = await response.json();
            alert(data.message);
        }
    </script>
</head>
<body>

    <h2>Signup</h2>
    <form id="signupForm" onsubmit="submitSignupForm(event)">
        <label for="signupEmail">Email:</label>
        <input type="email" id="signupEmail" required>
        <br>
        <label for="signupPassword">Password:</label>
        <input type="password" id="signupPassword" required>
        <br>
        <input type="submit" value="Sign Up">
    </form>

    <h2>Login</h2>
    <form id="loginForm" onsubmit="submitLoginForm(event)">
        <label for="loginEmail">Email:</label>
        <input type="email" id="loginEmail" required>
        <br>
        <label for="loginPassword">Password:</label>
        <input type="password" id="loginPassword" required>
        <br>
        <input type="submit" value="Log In">
    </form>

</body>
</html>
